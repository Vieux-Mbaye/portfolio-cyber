backend:
  name: github
  repo: Vieux-Mbaye/portfolio-cyber
  branch: main
  base_url: https://vndour.vercel.app
  auth_endpoint: api/auth
  site_domain: vndour.vercel.app
  auth_scope: public_repo

local_backend: true
publish_mode: editorial_workflow
media_folder: public/uploads
public_folder: /uploads

site_url: https://vndour.vercel.app
display_url: https://vndour.vercel.app
logo_url: /favicon.svg

collections:
  - name: articles
    label: Articles
    label_singular: Article
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    preview_path: "articles/{{slug}}"
    fields:
      - label: Titre
        name: title
        widget: string
      - label: Description
        name: description
        widget: text
      - label: Date de publication
        name: publishDate
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
      - label: Date de mise à jour
        name: updatedDate
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
        required: false
      - label: Langue
        name: language
        widget: select
        default: fr
        options:
          - { label: Français, value: fr }
          - { label: English, value: en }
      - label: Tags
        name: tags
        widget: list
        default: []
      - label: Image de couverture
        name: cover
        widget: image
        required: false
      - label: Brouillon
        name: draft
        widget: boolean
        default: false
      - label: Contenu
        name: body
        widget: markdown
